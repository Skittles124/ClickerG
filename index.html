<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Кликер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="upgrade">
        <button  id="OpenUp">Открыть Улучшатор</button>
        <button id="settings">Настройки</button>
        <button class="hidden" id="backsettings">Обратно</button>
        <button class="hidden" id="close">Обратно</button>
        <button class="hidden" id="shopClick">Магазин кликов</button>
        <button class="hidden" id="shopClickPerMinute">Авто-клики</button>
        <button class="hidden" id="backShop">🤖</button>
        <button class="hidden" id="backShopMenu">Назад в меню</button>
        <button class="hidden" id="backMain">👾</button>
        <button class="hidden" id="upgrade1">Улучшение:  10 кликов</button>
        <button class="hidden" id="upgrade2">Улучшение:  20 кликов</button>
        <button class="hidden" id="upgrade3">Улучшение:  30 кликов</button>
        <button class="hidden" id="upgrade4">Улучшение:  40 кликов</button>
        <button class="hidden" id="upgrade5">Улучшение:  50 кликов</button>
        <button class="hidden" id="resetProgress">Сбросить прогресс</button>
        <button class="hidden" id="toggleParticles">Выключить частицы</button>
        <button class="hidden" id="autoUpgrade">Купить авто-клик (100)</button>
    </div>
    <div id="statsPanel">
    <p>📊 Всего кликов: <span id="totalStats">0</span></p>
    <p>🤖 Авто-клики: <span id="autoStats">0</span></p>
    <p>⚡ Сила клика: <span id="powerStats">1</span></p>
</div>
<div id="progressBar">
    <div id="progressFill"></div>
</div>
<div id="tipBox">
    💡 Совет: сначала качай авто-клики
</div>
    <div class="main-content">
        <h1 id="h1">Кликов сделано:0</h1>
        <button id="button">Жми!</button>
        <p id="clicksminute">Кликов в cекунду:1</p>
        <button id="helpBtn">📖 Как играть</button>
    </div>
    <button id="winButton" style="display:none; margin:40px auto; padding:20px 60px; font-size:28px; background:#d32f2f; color:white; border:none; border-radius:12px; cursor:pointer;">
        Пройти игру (10000 кликов)
    </button>
    <div id="winScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; color:white; text-align:center;">
        <div>
            <h2 style="font-size:60px; margin:10px;">🎉 ПОЗДРАВЛЯЕМ! 🎉</h2>
            <h1 style="font-size:45px;">Вы прошли игру!</h1>
            <p style="font-size:26px; margin:20px;">Отличная работа!</p>
            <button onclick="location.reload()" style="padding:15px 50px; font-size:24px; margin-top:20px;">Играть заново</button>
        </div>
    </div>
    <div id="floatTextContainer"></div>
    <div id="clickParticles"></div>
    <div id="particles"></div>
    <script src="script.js"></script>
    <script src="particles.js"></script>
</body>
</html>
